<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean UI Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="badge">Feature CSS</p>
      <h1>Welcome</h1>
      <p class="description">
        This page now uses a separate stylesheet with a clean, reusable UI.
      </p>
      <ul class="feature-list">
        <li>Responsive card layout</li>
        <li>Consistent spacing and typography</li>
        <li>Clear call-to-action buttons</li>

      <div class="actions">
        <button type="button">Explore</button>
        <button type="button" class="secondary">Learn More</button>
      </div>
    </section>
  </main>

</html>
