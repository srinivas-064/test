<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean UI Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="badge">Feature JS</p>
      <h1>Welcome</h1>
      <p class="description">
        This page now uses a separate JavaScript file for a small interactive touch.
      </p>
      <p class="status" id="status">Click the button to preview the message update.</p>
      <div class="actions">
        <button type="button" id="toggle-message">Show message</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
